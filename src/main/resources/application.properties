spring.application.name=medicare-project

# ===== Database =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medicare_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:vishva}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:MediCareSecretKey2026SuperSecureKeyForJWTTokenGeneration}
