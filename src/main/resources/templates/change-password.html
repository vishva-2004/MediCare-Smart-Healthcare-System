<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Password — MediCare</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="container" style="max-width:520px">
  <h1 class="page-title">Change Password</h1>
  <p class="page-sub">Update your account password</p>

  <div class="card" style="padding:32px">
    <div id="alertBox"></div>
    <form id="cpForm">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" name="currentPassword" class="form-control" required placeholder="Enter current password">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="newPassword" class="form-control" required minlength="4" placeholder="Enter new password (min 4 chars)">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirmPassword" class="form-control" required placeholder="Re-enter new password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Update Password</button>
    </form>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
if (MediCare.requireLogin()) {
  MediCare.renderTopbar('change-password');

  document.getElementById('cpForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const box = document.getElementById('alertBox');
    box.innerHTML = '';
    const btn = e.target.querySelector('button');
    btn.textContent = 'Updating...'; btn.disabled = true;

    const fd = new FormData(e.target);
    const body = {
      currentPassword:  fd.get('currentPassword'),
      newPassword:      fd.get('newPassword'),
      confirmPassword:  fd.get('confirmPassword')
    };

    const res = await MediCare.api('/auth/change-password', {
      method:'POST', body: JSON.stringify(body)
    });
    if (!res) return;
    const data = await res.json();

    if (!res.ok) {
      box.innerHTML = '<div class="alert alert-error">'+(data.message||'Failed')+'</div>';
      btn.textContent = 'Update Password'; btn.disabled = false;
      return;
    }
    box.innerHTML = '<div class="alert alert-success">Password changed successfully! Redirecting to dashboard...</div>';
    setTimeout(() => {
      const role = MediCare.role();
      if (role === 'ADMIN') window.location.href = '/dashboard';
      else if (role === 'DOCTOR') window.location.href = '/doctor-dashboard';
      else window.location.href = '/patient-dashboard';
    }, 1800);
  });
}
</script>
</body></html>
