<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — MediCare</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body style="background:linear-gradient(135deg,#e0f4f7 0%,#f7fafc 100%);min-height:100vh">
<nav class="topbar">
  <div class="topbar-inner">
    <a href="/home" class="brand"><span class="brand-mark">+</span>Medi<span>Care</span></a>
    <div class="nav-links">
      <a href="/home">Home</a>
      <a href="/login">Sign In</a>
    </div>
  </div>
</nav>

<div class="container-sm" style="max-width:520px">
  <div class="card" style="padding:36px">
    <h2 class="page-title" style="text-align:center">Create your account</h2>
    <p class="page-sub" style="text-align:center">Register as a patient — it takes less than a minute</p>

    <div id="alertBox"></div>

    <form id="regForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="fullName" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input type="tel" name="phone" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" minlength="4" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
      Already registered? <a href="/login">Sign in</a>
    </p>
  </div>
</div>

<script>
document.getElementById('regForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const box = document.getElementById('alertBox');
  box.innerHTML = '';
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  try {
    const res = await fetch('/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      box.innerHTML = '<div class="alert alert-error">'+(data.message||'Registration failed')+'</div>';
      return;
    }
    box.innerHTML = '<div class="alert alert-success">'+data.message+' Redirecting to login…</div>';
    setTimeout(()=>{window.location.href='/login';}, 1200);
  } catch(err) {
    box.innerHTML = '<div class="alert alert-error">Network error. Please try again.</div>';
  }
});
</script>
</body></html>
