<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — MediCare</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.auth-wrap{min-height:100vh;background:linear-gradient(135deg,#e0f4f7 0%,#f7fafc 100%);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:440px;box-shadow:0 10px 40px rgba(10,77,104,.12);border:1px solid var(--border)}
.auth-logo{text-align:center;margin-bottom:28px}
.brand-icon{width:48px;height:48px;border-radius:12px;background:var(--primary);display:inline-grid;place-items:center;color:#fff;font-weight:800;font-size:22px;margin-bottom:10px}
.temp-box{background:#fef3c7;border:1px solid #fbbf24;border-radius:10px;padding:20px;margin-top:20px;text-align:center}
.temp-password{font-size:28px;font-weight:800;color:var(--primary);letter-spacing:4px;font-family:monospace;background:var(--accent-light);padding:10px 20px;border-radius:8px;display:inline-block;margin:8px 0}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">+</div>
      <h2 style="font-size:22px;font-weight:800;color:var(--primary);margin-bottom:4px">Forgot Password</h2>
      <p style="font-size:14px;color:var(--muted)">Enter your username to get a temporary password</p>
    </div>

    <div id="alertBox"></div>
    <div id="resultBox"></div>

    <form id="fpForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus placeholder="Enter your username">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Get Temporary Password</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
      Remember your password? <a href="/login">Sign in</a>
    </p>
  </div>
</div>

<script>
document.getElementById('fpForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const alertBox  = document.getElementById('alertBox');
  const resultBox = document.getElementById('resultBox');
  alertBox.innerHTML = '';
  resultBox.innerHTML = '';
  const btn = e.target.querySelector('button');
  btn.textContent = 'Processing...';
  btn.disabled = true;

  const fd = new FormData(e.target);
  const body = { username: fd.get('username') };

  try {
    const res = await fetch('/auth/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      alertBox.innerHTML = '<div class="alert alert-error">'+(data.message||'Failed')+'</div>';
      btn.textContent = 'Get Temporary Password'; btn.disabled = false;
      return;
    }
    e.target.style.display = 'none';
    resultBox.innerHTML = `
      <div class="temp-box">
        <p style="font-weight:600;color:#92400e;margin-bottom:8px">Your temporary password:</p>
        <div class="temp-password">${data.tempPassword}</div>
        <p style="font-size:13px;color:#92400e;margin-top:10px">
          <strong>Important:</strong> Write this down. Login with username <strong>${data.username}</strong> and this password, then change your password immediately.
        </p>
      </div>
      <a href="/login" class="btn btn-primary btn-block" style="margin-top:20px">Go to Login</a>`;
  } catch(err) {
    alertBox.innerHTML = '<div class="alert alert-error">Network error. Please try again.</div>';
    btn.textContent = 'Get Temporary Password'; btn.disabled = false;
  }
});
</script>
</body></html>
