<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Symptom Checker — MediCare</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.result-card{background:linear-gradient(135deg,#e0f4f7,#f7fafc);border:1px solid #bae6fd;border-radius:14px;padding:28px;margin-top:24px}
.result-title{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.result-item{background:#fff;border-radius:10px;padding:14px;border:1px solid var(--border)}
.result-item .label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.result-item .value{font-size:15px;font-weight:700;color:var(--primary)}
.result-advice{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:16px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-tag{background:#7dd3fc;color:#0c4a6e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px}
.kw-tag{background:#fde68a;color:#78350f;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px}
</style>
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="container" style="max-width:820px">
  <h1 class="page-title">AI Symptom Checker</h1>
  <p class="page-sub">Describe your symptoms and get an instant specialist recommendation.</p>

  <div class="card">
    <div class="alert alert-info" style="margin-bottom:20px">
      <strong>Medical Disclaimer:</strong> This is an AI-powered suggestion tool, not a medical diagnosis.
      Always consult a qualified doctor for proper evaluation and treatment.
    </div>

    <form id="symForm">
      <div class="form-group">
        <label class="form-label">Describe your symptoms in detail</label>
        <textarea name="symptoms" class="form-control" rows="6"
          placeholder="Example: I have a severe headache since morning with dizziness and mild fever. The pain is on the left side of my head..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" id="analyzeBtn">Analyze Symptoms</button>
    </form>

    <div id="result"></div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
if (MediCare.requireLogin()) {
  MediCare.renderTopbar('symptoms');
}

document.getElementById('symForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const box = document.getElementById('result');
  const btn = document.getElementById('analyzeBtn');
  box.innerHTML = '<div style="display:flex;align-items:center;color:var(--muted);margin-top:20px"><span class="spinner"></span>Analyzing your symptoms...</div>';
  btn.disabled = true; btn.textContent = 'Analyzing...';

  const fd = new FormData(e.target);
  const res = await MediCare.api('/ai/analyze', {
    method:'POST',
    body: JSON.stringify({ symptoms: fd.get('symptoms') })
  });
  btn.disabled = false; btn.textContent = 'Analyze Symptoms';

  if (!res) return;
  const data = await res.json();
  if (!res.ok) { box.innerHTML = '<div class="alert alert-error" style="margin-top:20px">'+(data.message||'Analysis failed')+'</div>'; return; }

  let urgencyBadge='badge-info';
  if(data.urgency==='Emergency') urgencyBadge='badge-danger';
  else if(data.urgency==='High') urgencyBadge='badge-danger';
  else if(data.urgency==='Medium') urgencyBadge='badge-warn';
  else urgencyBadge='badge-success';

  const sourceTag = data.source==='ai'
    ? '<span class="ai-tag">Claude AI</span>'
    : '<span class="kw-tag">Keyword Analysis</span>';

  const deptParam = encodeURIComponent(data.department||data.specialization||'');

  box.innerHTML = `
    <div class="result-card">
      <div class="result-title">Analysis Result ${sourceTag}</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="label">Likely Condition</div>
          <div class="value" style="font-size:14px">${data.condition||'-'}</div>
        </div>
        <div class="result-item">
          <div class="label">Recommended Specialist</div>
          <div class="value">${data.specialization||'-'}</div>
        </div>
        <div class="result-item">
          <div class="label">Department</div>
          <div class="value">${data.department||'-'}</div>
        </div>
        <div class="result-item">
          <div class="label">Urgency Level</div>
          <div class="value"><span class="badge ${urgencyBadge}" style="font-size:13px">${data.urgency||'-'}</span></div>
        </div>
      </div>
      <div class="result-advice">
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">First-Aid Advice</div>
        <p style="font-size:14px;line-height:1.6;color:var(--text)">${data.advice||'-'}</p>
      </div>
      ${data.matched ? `<p style="font-size:12px;color:var(--muted)"><strong>Matched keywords:</strong> ${data.matched}</p>` : ''}
      <div style="margin-top:16px">
        <a href="/doctors?dept=${deptParam}" class="btn btn-accent" style="margin-right:10px">Book with a ${data.specialization}</a>
        <a href="/doctors" class="btn btn-outline">Browse All Doctors</a>
      </div>
    </div>`;
});
</script>
</body></html>
