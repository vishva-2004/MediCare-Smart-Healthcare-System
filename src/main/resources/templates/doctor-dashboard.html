<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doctor Dashboard — MediCare</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.dash-header{background:linear-gradient(135deg,#0a4d68 0%,#088395 100%);color:#fff;padding:32px 24px}
.dash-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.dash-welcome h1{font-size:24px;font-weight:800;margin-bottom:4px}
.dash-welcome p{opacity:.85;font-size:14px}
.notif-bell{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff;position:relative}
.notif-bell:hover{background:rgba(255,255,255,.2)}
.notif-badge{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.dash-body{max-width:1200px;margin:0 auto;padding:28px 24px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.dash-stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.dash-stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dash-stat-body .val{font-size:24px;font-weight:800;color:var(--primary);line-height:1}
.dash-stat-body .lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.appt-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow);transition:box-shadow .15s}
.appt-card:hover{box-shadow:var(--shadow-lg)}
.appt-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.patient-info{display:flex;align-items:center;gap:10px}
.patient-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.patient-name{font-weight:700;color:var(--primary);font-size:15px}
.patient-meta{font-size:12px;color:var(--muted)}
.appt-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.rec-form{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;display:none}
.rec-form.open{display:block}
.notif-panel{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;display:none;box-shadow:var(--shadow)}
.notif-panel.open{display:block}
.notif-item{padding:10px 0;border-bottom:1px solid #f0f4f8;display:flex;align-items:flex-start;gap:10px;font-size:13px}
.notif-item:last-child{border-bottom:none}
@media(max-width:768px){.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="topbar" id="topbar"></nav>

<div class="dash-header">
  <div class="dash-header-inner">
    <div class="dash-welcome">
      <h1>Doctor Dashboard</h1>
      <p>Manage your appointments and patient records</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <a href="/change-password" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;color:#fff;text-decoration:none">🔐 Change Password</a>
      <div class="notif-bell" onclick="toggleNotif()">
        🔔 Notifications
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </div>
    </div>
  </div>
</div>

<div class="dash-body">

  <!-- Notifications Panel -->
  <div class="notif-panel" id="notifPanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="font-size:15px;font-weight:700;color:var(--primary);margin:0">Notifications</h3>
      <button class="btn btn-outline" style="font-size:12px;padding:4px 12px" onclick="markAllRead()">Mark All Read</button>
    </div>
    <div id="notifList"><p style="color:var(--muted);font-size:13px">Loading...</p></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="dash-stat">
      <div class="dash-stat-icon" style="background:#e0f4f7;color:#088395">📅</div>
      <div class="dash-stat-body"><div class="val" id="s-total">—</div><div class="lbl">Total Appointments</div></div>
    </div>
    <div class="dash-stat">
      <div class="dash-stat-icon" style="background:#fef3c7;color:#d97706">⏳</div>
      <div class="dash-stat-body"><div class="val" id="s-pending">—</div><div class="lbl">Pending</div></div>
    </div>
    <div class="dash-stat">
      <div class="dash-stat-icon" style="background:#dcfce7;color:#16a34a">✅</div>
      <div class="dash-stat-body"><div class="val" id="s-confirmed">—</div><div class="lbl">Confirmed</div></div>
    </div>
    <div class="dash-stat">
      <div class="dash-stat-icon" style="background:#eff6ff;color:#2563eb">🏁</div>
      <div class="dash-stat-body"><div class="val" id="s-done">—</div><div class="lbl">Completed</div></div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filter('ALL',this)">All</button>
    <button class="filter-btn" onclick="filter('PENDING',this)">Pending</button>
    <button class="filter-btn" onclick="filter('CONFIRMED',this)">Confirmed</button>
    <button class="filter-btn" onclick="filter('COMPLETED',this)">Completed</button>
    <button class="filter-btn" onclick="filter('CANCELLED',this)">Cancelled</button>
  </div>

  <!-- Appointment List -->
  <div id="apptList"><p style="color:var(--muted)">Loading appointments...</p></div>

</div>

<script src="/js/auth.js"></script>
<script>
let allAppts = [];
if (MediCare.requireLogin()) {
  MediCare.renderTopbar('dashboard');
  loadAll();
}

async function loadAll(){
  const [apptRes, nRes] = await Promise.all([
    MediCare.api('/appointment/my'),
    MediCare.api('/notification/my')
  ]);

  if (apptRes) {
    allAppts = await apptRes.json();
    updateStats(allAppts);
    renderAppts(allAppts);
  }

  if (nRes) {
    const nd = await nRes.json();
    const unread = nd.unread || 0;
    if (unread > 0) {
      document.getElementById('notif-badge').textContent = unread;
      document.getElementById('notif-badge').style.display = 'flex';
    }
    renderNotifs(nd.notifications || []);
  }
}

function updateStats(list){
  document.getElementById('s-total').textContent = list.length;
  document.getElementById('s-pending').textContent = list.filter(a=>a.status==='PENDING').length;
  document.getElementById('s-confirmed').textContent = list.filter(a=>a.status==='CONFIRMED').length;
  document.getElementById('s-done').textContent = list.filter(a=>a.status==='COMPLETED').length;
}

function filter(status, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status==='ALL' ? allAppts : allAppts.filter(a=>a.status===status);
  renderAppts(filtered);
}

function renderAppts(list){
  const box = document.getElementById('apptList');
  if (!list.length) { box.innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:32px">No appointments found</div>'; return; }
  box.innerHTML = list.map(a => {
    const initials = (a.patientName||'P').charAt(0).toUpperCase();
    const slot = a.timeSlot ? formatSlot(a.timeSlot) : '';
    return `<div class="appt-card">
      <div class="appt-card-header">
        <div class="patient-info">
          <div class="patient-avatar">${initials}</div>
          <div>
            <div class="patient-name">${a.patientName||'-'}</div>
            <div class="patient-meta">${a.appointmentDate||'-'} ${slot?'· '+slot:''}</div>
          </div>
        </div>
        <span class="badge ${badgeFor(a.status)}">${a.status}</span>
      </div>
      ${a.symptoms ? `<p style="font-size:13px;color:var(--muted);margin:6px 0"><strong>Symptoms:</strong> ${a.symptoms}</p>` : ''}
      ${a.notes ? `<p style="font-size:13px;color:var(--muted);margin:6px 0"><strong>Notes:</strong> ${a.notes}</p>` : ''}
      <div class="appt-actions">
        ${a.status==='PENDING' ? `<button class="btn btn-accent" style="font-size:13px;padding:7px 16px" onclick="confirm(${a.id})">Confirm Appointment</button>` : ''}
        ${a.status==='CONFIRMED' ? `<button class="btn btn-primary" style="font-size:13px;padding:7px 16px" onclick="toggleRecForm(${a.id},${a.patientId})">Add Prescription &amp; Complete Visit</button>` : ''}
        ${a.status==='COMPLETED' ? `<span style="font-size:13px;color:var(--success);font-weight:600">✅ Visit Completed</span>` : ''}
        ${a.status==='CANCELLED' ? `<span style="font-size:13px;color:var(--danger);font-weight:600">❌ Cancelled</span>` : ''}
      </div>
      <div class="rec-form" id="recForm-${a.id}">
        <h4 style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px">Complete Visit — Add Prescription</h4>
        <div class="form-group">
          <label class="form-label">Diagnosis *</label>
          <input class="form-control" id="diag-${a.id}" placeholder="e.g. Viral fever, Hypertension..." required>
        </div>
        <div class="form-group">
          <label class="form-label">Prescription / Medicines</label>
          <textarea class="form-control" id="presc-${a.id}" rows="3" placeholder="e.g. Paracetamol 500mg twice daily for 5 days..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Doctor's Notes</label>
          <textarea class="form-control" id="notes-${a.id}" rows="2" placeholder="Additional observations or follow-up advice..."></textarea>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-accent" onclick="submitRecord(${a.id},${a.patientId})">Save &amp; Complete Visit</button>
          <button class="btn btn-outline" onclick="toggleRecForm(${a.id},${a.patientId})">Cancel</button>
        </div>
        <div id="rec-msg-${a.id}"></div>
      </div>
    </div>`;
  }).join('');
}

function toggleRecForm(apptId, patientId){
  const form = document.getElementById('recForm-'+apptId);
  form.classList.toggle('open');
}

async function confirm(id){
  const res = await MediCare.api('/appointment/confirm/'+id, {method:'POST'});
  if (res && res.ok) { const d = await res.json(); alert(d.message||'Confirmed'); loadAll(); }
}

async function submitRecord(apptId, patientId){
  const diagnosis    = document.getElementById('diag-'+apptId).value.trim();
  const prescription = document.getElementById('presc-'+apptId).value.trim();
  const notes        = document.getElementById('notes-'+apptId).value.trim();
  const msgBox       = document.getElementById('rec-msg-'+apptId);

  if (!diagnosis) { msgBox.innerHTML='<div class="alert alert-error" style="margin-top:8px">Diagnosis is required.</div>'; return; }

  const res = await MediCare.api('/medical-record/complete-visit', {
    method:'POST',
    body: JSON.stringify({ appointmentId: apptId, patientId, diagnosis, prescription, notes })
  });
  if (!res) return;
  const data = await res.json();
  if (!res.ok) { msgBox.innerHTML='<div class="alert alert-error" style="margin-top:8px">'+(data.message||'Error')+'</div>'; return; }
  msgBox.innerHTML='<div class="alert alert-success" style="margin-top:8px">Visit completed &amp; prescription saved!</div>';
  setTimeout(loadAll, 1500);
}

function toggleNotif(){
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('open');
}

function renderNotifs(list){
  const box = document.getElementById('notifList');
  if (!list.length) { box.innerHTML='<p style="color:var(--muted);font-size:13px">No notifications</p>'; return; }
  box.innerHTML = list.slice(0,10).map(n => `
    <div class="notif-item">
      <span style="font-size:16px">${n.read?'📭':'📬'}</span>
      <div style="flex:1"><p style="margin:0;color:${n.read?'var(--muted)':'var(--text)'}">${n.message}</p><small style="color:var(--muted)">${n.createdAt||''}</small></div>
    </div>`).join('');
}

async function markAllRead(){
  await MediCare.api('/notification/read-all',{method:'POST'});
  document.getElementById('notif-badge').style.display='none';
  loadAll();
}

function formatSlot(slot){
  const [h,m] = slot.split(':');
  const hr = parseInt(h);
  return (hr%12||12)+':'+(m||'00')+' '+(hr<12?'AM':'PM');
}
function badgeFor(s){
  if(s==='CONFIRMED') return 'badge-success';
  if(s==='CANCELLED') return 'badge-danger';
  if(s==='COMPLETED') return 'badge-info';
  return 'badge-warn';
}
</script>
</body></html>
